<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Orçamento pessoal</title>

    <!-- Bootstrap 5.3 CSS (apenas 1x) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="app.js"></script>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-5">
        <div class="container">
            <a class="navbar-brand" href="#">
                <img src="logo.png" width="50" height="35" alt="Orçamento pessoal">
            </a>
            <button class="navbar-toggler" type="button" 
                    data-bs-toggle="collapse" 
                    data-bs-target="#navbarSupportedContent" 
                    aria-controls="navbarSupportedContent" 
                    aria-expanded="false" 
                    aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="index.html">Cadastro</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="consulta.html">Consulta</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Título -->
        <div class="row">
            <div class="col mb-5">
                <h1 class="display-4">Registro de nova despesa</h1>
            </div>
        </div>

        <!-- Filtros -->
        <div class="row mb-2">
            <div class="col-md-2">
                <select class="form-select" id="ano">
                    <option value="">Ano</option>
                    <option value="2026" selected>2026</option>
                </select>
            </div>
            <div class="col-md-2">
                <select class="form-select" id="mes">
                    <option value="">Mês</option>
                    <option value="1">Janeiro</option>
                    <option value="2">Fevereiro</option>
                    <option value="3">Março</option>
                    <option value="4">Abril</option>
                    <option value="5">Maio</option>
                    <option value="6">Junho</option>
                    <option value="7">Julho</option>
                    <option value="8">Agosto</option>
                    <option value="9">Setembro</option>
                    <option value="10">Outubro</option>
                    <option value="11">Novembro</option>
                    <option value="12">Dezembro</option>
                </select>
            </div>
            <div class="col-md-2">
                <input type="number" class="form-control" placeholder="Dia" id="dia" min="1" max="31">
            </div>
            <div class="col-md-6">
                <select class="form-select" id="tipo">
                    <option value="">Tipo</option>
                    <option value="1">Alimentação</option>
                    <option value="2">Contas da Casa</option>
                    <option value="3">Lazer</option>
                    <option value="4">Cartões</option>
                    <option value="5">Motocicleta</option>
                </select>
            </div>
        </div>

        <!-- Formulário principal -->
        <div class="row">
            <div class="col-md-8">
                <input type="text" class="form-control" placeholder="Descrição" id="descricao">
            </div>
            <div class="col-md-2">
                <input type="number" step="0.01" class="form-control" placeholder="0,00" id="valor">
            </div>
            <div class="col-md-2 d-flex justify-content-end align-items-end">
                <button type="button" class="btn btn-primary btn-lg" onclick="cadastrarDespesa()">
                    <i class="fas fa-plus me-1"></i>Cadastrar
                </button>
            </div>
        </div>
    </div>

    <!-- Modal CORRIGIDO -->
    <div class="modal fade" id="modalRegistrarDespesa" tabindex="-1" aria-labelledby="modal_titulo" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header" id="modal_titulo_div">
                    <h1 class="modal-title fs-5" id="modal_titulo">Confirmar Despesa</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="modal_conteudo">
                    Conteúdo será preenchido aqui...
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" id="modal_btn" class="btn btn-primary">Confirmar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5.3 JS Bundle (Popper + Bootstrap) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
