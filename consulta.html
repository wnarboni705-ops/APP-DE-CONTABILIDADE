<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Orçamento pessoal - Consulta</title>

    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="app.js"></script>
</head>

<body onload="carregaListaDespesa()">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-5">
        <div class="container">
            <a class="navbar-brand" href="#">
                <img src="logo.png" width="50" height="35" alt="Orçamento pessoal">
            </a>
            <button class="navbar-toggler" type="button" 
                    data-bs-toggle="collapse" 
                    data-bs-target="#navbarSupportedContent" 
                    aria-controls="navbarSupportedContent" 
                    aria-expanded="false" 
                    aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Cadastro</a>
                    </li>
                    <li class="nav-item active">
                        <a class="nav-link" href="consulta.html">Consulta</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Título -->
        <div class="row mb-5">
            <div class="col">
                <h1 class="display-4">Consulta de despesas</h1>
            </div>
        </div>

        <!-- Filtros -->
        <div class="row mb-2">
            <div class="col-md-2">
                <select class="form-select" id="ano">
                    <option value="">Ano</option>
                    <option value="2026" selected>2026</option>
                </select>
            </div>
            <div class="col-md-2">
                <select class="form-select" id="mes">
                    <option value="">Mês</option>
                    <option value="1">Janeiro</option>
                    <option value="2">Fevereiro</option>
                    <option value="3">Março</option>
                    <option value="4">Abril</option>
                    <option value="5">Maio</option>
                    <option value="6">Junho</option>
                    <option value="7">Julho</option>
                    <option value="8">Agosto</option>
                    <option value="9">Setembro</option>
                    <option value="10">Outubro</option>
                    <option value="11">Novembro</option>
                    <option value="12">Dezembro</option>
                </select>
            </div>
            <div class="col-md-2">
                <input type="number" class="form-control" placeholder="Dia" id="dia" min="1" max="31">
            </div>
            <div class="col-md-6">
                <select class="form-select" id="tipo">
                    <option value="">Tipo</option>
                    <option value="1">Alimentação</option>
                    <option value="2">Contas da Casa</option>
                    <option value="3">Lazer</option>
                    <option value="4">Cartões</option>
                    <option value="5">Motocicleta</option>
                </select>
            </div>
        </div>

        <!-- Campos de busca -->
       
    <div class="row mb-5">
        <div class="col-md-8">
            <input type="text" class="form-control" placeholder="Filtrar por descrição" id="descricao">
        </div>
    <div class="col-md-2">
        <input type="number" step="0.01" class="form-control" placeholder="Valor mínimo" id="valor">
    </div>
    <!--  AQUI os botões corrigidos  -->
    <div class="col-md-2 d-flex justify-content-end gap-2">
        <button type="button" class="btn btn-primary" onclick="pesquisarDespesas()">
            <i class="fas fa-search me-1"></i>Filtrar
        </button>
        <button type="button" class="btn btn-outline-secondary" onclick="limparFiltros()">
            <i class="fas fa-redo me-1"></i>Limpar
        </button>
    </div>
</div>

        <!-- Tabela de resultados -->
        <div class="row">
            <div class="col">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0"><i class="fas fa-list"></i> Despesas encontradas</h5>
                        <span id="totalRegistros" class="badge bg-primary">0 registros</span>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0">
                                <thead class="table-dark">
                                    <tr>
                                        <th>Data</th>
                                        <th>Tipo</th>
                                        <th>Descrição</th>
                                        <th class="text-end">Valor</th>
                                        <th>Ações</th>
                                    </tr>
                                </thead>
                                <tbody id="tabelaDespesas">
                                    <!-- Resultados aqui -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <div class="card-footer text-end">
                        <strong id="totalGasto">Total: R$ 0,00</strong>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5.3 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
